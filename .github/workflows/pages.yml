name: Deploy editor to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build kestrelc-web
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path kestrelc-web/Cargo.toml
      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp kestrel-editor.html _site/index.html
          cp kestrel.js _site/kestrel.js
          cp kestrelc-web/target/wasm32-unknown-unknown/release/kestrelc_web.wasm _site/kestrelc.wasm
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
