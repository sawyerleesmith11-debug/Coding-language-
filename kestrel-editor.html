<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kestrel" />
<title>Kestrel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12151c;
    --surface: #1b2029;
    --surface-2: #232a36;
    --line: #2c3340;
    --text: #e8e3d9;
    --text-dim: #8b93a3;
    --rust: #c9803d;
    --rust-dim: #8a5d30;
    --wing: #5c7a99;
    --danger: #d9694a;
    --ok: #7fae7a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    flex-shrink: 0;
  }
  .mark {
    width: 22px; height: 22px; position: relative; flex-shrink: 0;
  }
  .mark .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--rust);
    position: absolute; top: 7px; left: 7px;
    animation: hover 2.6s ease-in-out infinite;
  }
  .mark.running .dot { animation: hover-fast 0.5s ease-in-out infinite; background: var(--ok); }
  @keyframes hover {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
  }
  @keyframes hover-fast {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-2px) scale(1.15); }
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px; font-weight: 700; margin: 0;
    letter-spacing: 0.01em;
    flex: 1;
  }
  h1 span { color: var(--rust); }

  .run-btn {
    background: var(--rust); color: #16110b; border: none;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 14px; padding: 9px 16px; border-radius: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .run-btn:active { background: var(--rust-dim); }
  .run-btn:disabled { opacity: 0.5; }

  .tabs {
    display: flex; gap: 4px; padding: 8px 16px;
    background: var(--surface); flex-shrink: 0;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    flex: 1; text-align: center; padding: 8px 0;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 13px;
    color: var(--text-dim); border-radius: 7px; background: transparent; border: none;
  }
  .tab.active { background: var(--surface-2); color: var(--text); }

  .examples {
    background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    border-radius: 6px; padding: 5px 8px; margin-left: 4px;
  }

  main { flex: 1; position: relative; overflow: hidden; }
  .view { position: absolute; inset: 0; display: none; flex-direction: column; }
  .view.active { display: flex; }

  .editor-wrap { flex: 1; position: relative; overflow: auto; }
  .editor-layer {
    position: absolute; inset: 0;
    margin: 0; padding: 16px 16px 16px 52px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.55;
    white-space: pre; pointer-events: none; color: var(--text);
  }
  textarea#code {
    position: absolute; inset: 0; width: 100%; height: 100%;
    margin: 0; padding: 16px 16px 16px 52px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.55;
    background: transparent; color: transparent; caret-color: var(--rust);
    border: none; outline: none; resize: none;
    -webkit-text-fill-color: transparent;
    white-space: pre; overflow-wrap: normal;
    z-index: 2;
  }
  .gutter {
    position: absolute; top: 0; bottom: 0; left: 0; width: 40px;
    padding: 16px 0; text-align: right; padding-right: 8px;
    font-size: 14px; line-height: 1.55; color: #3d4553;
    background: var(--surface); border-right: 1px solid var(--line);
    pointer-events: none; z-index: 1;
  }

  .kw { color: var(--rust); font-weight: 500; }
  .str { color: var(--ok); }
  .num { color: var(--wing); }
  .com { color: var(--text-dim); font-style: italic; }

  #output {
    flex: 1; overflow: auto; padding: 16px; font-size: 13.5px; line-height: 1.6;
  }
  .line { margin-bottom: 4px; white-space: pre-wrap; word-break: break-word; }
  .line.err { color: var(--danger); }
  .line.note { color: var(--wing); }
  .line.ok { color: var(--text-dim); }
  .empty-state { color: var(--text-dim); font-size: 13px; }

  footer {
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line); background: var(--surface);
    font-size: 11px; color: var(--text-dim); flex-shrink: 0;
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="mark" id="mark"><div class="dot"></div></div>
  <h1>Kestrel<span>.</span></h1>
  <select class="examples" id="examples">
    <option value="">examples…</option>
    <option value="basics">basics</option>
    <option value="fib">fibonacci</option>
    <option value="purity">purity check</option>
  </select>
  <select class="examples" id="engine" title="Fast: bytecode VM, faster than Compat on every workload measured. Compat: tree-walking interpreter, the reference implementation. Native: compiles to WASM client-side, near-native speed — integers/functions/control-flow/print/arrays.">
    <option value="fast" selected>engine: fast</option>
    <option value="compat">engine: compat</option>
    <option value="native">engine: native (wasm)</option>
  </select>
  <button class="run-btn" id="runBtn">▶ Run</button>
</header>

<div class="tabs">
  <button class="tab active" data-view="code">Code</button>
  <button class="tab" data-view="output">Output</button>
</div>

<main>
  <div class="view active" id="view-code">
    <div class="editor-wrap">
      <div class="gutter" id="gutter">1</div>
      <pre class="editor-layer" id="highlight"></pre>
      <textarea id="code" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
    </div>
  </div>
  <div class="view" id="view-output">
    <div id="output"><div class="empty-state">Run your program to see output here.</div></div>
  </div>
</main>

<footer>
  <span id="status">saved on this device</span>
  <span>.kes</span>
</footer>

<!-- Loads kestrel.js straight from the repo instead of an embedded copy —
     no manual mirroring of interpreter changes into this file anymore.
     GitHub Pages deploys it alongside this file (see .github/workflows/pages.yml). -->
<script src="kestrel.js"></script>
<script>
/* ====================== EDITOR APP ====================== */

const codeEl = document.getElementById('code');
const highlightEl = document.getElementById('highlight');
const gutterEl = document.getElementById('gutter');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');
const markEl = document.getElementById('mark');
const runBtn = document.getElementById('runBtn');
const engineEl = document.getElementById('engine');

const EXAMPLES = {
  basics: `pure fn square(x: i32) -> i32 {
    return x * x;
}

pure fn sum_of_squares(a: i32, b: i32) -> i32 {
    return square(a) + square(b);
}

fn get_safe(arr: [i32; N], i: usize) -> i32 where i < N {
    return arr[i];
}

fn main() {
    let nums = [3, 4, 5, 6];
    let i = 0;
    while (i < 4) {
        print("square:", square(nums[i]));
        i = i + 1;
    }

    print("sum of squares(3,4) =", sum_of_squares(3, 4));
    print("safe get nums[2] =", get_safe(nums, 2));
}
`,
  fib: `pure fn fib(n: i32) -> i32 {
    if (n < 2) {
        return n;
    } else {
        return fib(n - 1) + fib(n - 2);
    }
}

fn main() {
    let i = 0;
    while (i < 10) {
        print("fib", i, "=", fib(i));
        i = i + 1;
    }
}
`,
  purity: `// This one is meant to fail the purity check on purpose —
// 'oops' is marked pure but calls print, which is an effect.
pure fn oops(x: i32) -> i32 {
    print("side effect!");
    return x;
}

fn main() {
    print(oops(1));
}
`
};

const DEFAULT_CODE = EXAMPLES.basics;
const STORAGE_KEY = 'kestrel:current-code';

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const KEYWORD_RE = /\b(fn|pure|let|if|else|while|where|print|return|true|false)\b/g;
const STRING_RE = /"[^"]*"/g;
const NUM_RE = /\b\d+(\.\d+)?\b/g;
const COMMENT_RE = /\/\/.*$/gm;

function highlight(src) {
  // Tokenize by scanning left-to-right so overlapping patterns
  // (e.g. a keyword inside a string) don't get double-highlighted.
  let html = '';
  let i = 0;
  const n = src.length;
  while (i < n) {
    const rest = src.slice(i);
    let m;
    if ((m = rest.match(/^\/\/.*/))) {
      html += `<span class="com">${escapeHtml(m[0])}</span>`;
      i += m[0].length;
    } else if ((m = rest.match(/^"[^"]*"/))) {
      html += `<span class="str">${escapeHtml(m[0])}</span>`;
      i += m[0].length;
    } else if ((m = rest.match(/^\b(fn|pure|let|if|else|while|where|print|return|true|false)\b/))) {
      html += `<span class="kw">${escapeHtml(m[0])}</span>`;
      i += m[0].length;
    } else if ((m = rest.match(/^\d+(\.\d+)?/))) {
      html += `<span class="num">${escapeHtml(m[0])}</span>`;
      i += m[0].length;
    } else {
      html += escapeHtml(src[i]);
      i += 1;
    }
  }
  return html + '\n';
}

function updateGutter(src) {
  const lines = src.split('\n').length;
  let out = '';
  for (let l = 1; l <= lines; l++) out += l + '\n';
  gutterEl.textContent = out;
}

function syncHighlight() {
  highlightEl.innerHTML = highlight(codeEl.value);
  updateGutter(codeEl.value);
}

codeEl.addEventListener('input', () => {
  syncHighlight();
  debounceSave();
});
codeEl.addEventListener('scroll', () => {
  highlightEl.style.transform = `translateY(${-codeEl.scrollTop}px)`;
  gutterEl.style.transform = `translateY(${-codeEl.scrollTop}px)`;
  highlightEl.parentElement.scrollLeft = codeEl.scrollLeft;
});

let saveTimer = null;
function debounceSave() {
  statusEl.textContent = 'editing…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await window.storage.set(STORAGE_KEY, codeEl.value);
      statusEl.textContent = 'saved on this device';
    } catch (e) {
      statusEl.textContent = 'not saved (storage unavailable)';
    }
  }, 500);
}

async function loadSaved() {
  try {
    const res = await window.storage.get(STORAGE_KEY);
    codeEl.value = (res && res.value) ? res.value : DEFAULT_CODE;
  } catch (e) {
    codeEl.value = DEFAULT_CODE;
  }
  syncHighlight();
}

function printLine(text, cls) {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  outputEl.appendChild(div);
}

function runProgram() {
  outputEl.innerHTML = '';
  markEl.classList.add('running');
  runBtn.disabled = true;
  switchView('output');

  const engine = engineEl.value;

  // Let the run-indicator animation paint before the (blocking) run.
  setTimeout(() => {
    if (engine === 'native') {
      runNative().finally(() => {
        markEl.classList.remove('running');
        runBtn.disabled = false;
      });
      return;
    }

    const useFast = engine === 'fast';
    const runFn = useFast ? Kestrel.runFast : Kestrel.run;
    const start = performance.now();
    try {
      const { boundsNotes } = runFn(codeEl.value, {
        onPrint: (s) => printLine(s)
      });
      const elapsed = performance.now() - start;
      if (boundsNotes.length) {
        boundsNotes.forEach((n) => printLine('note: ' + n, 'note'));
      }
      printLine(`— finished in ${formatElapsed(elapsed)} (${useFast ? 'fast' : 'compat'}) —`, 'ok');
    } catch (e) {
      const elapsed = performance.now() - start;
      const text = e instanceof Kestrel.KestrelError
        ? Kestrel.formatKestrelError(e, codeEl.value)
        : (e && e.message) ? e.message : String(e);
      text.split('\n').forEach((line) => printLine(line, 'err'));
      printLine(`— failed after ${formatElapsed(elapsed)} (${useFast ? 'fast' : 'compat'}) —`, 'err');
    } finally {
      markEl.classList.remove('running');
      runBtn.disabled = false;
    }
  }, 60);
}

// The "native" engine: compiles the current source to a real .wasm
// module client-side using kestrelc itself (also built as WASM — see
// kestrelc-web/), then instantiates and runs *that* module. Two WASM
// modules involved: the compiler (fetched once, cached) and whatever it
// produces from the user's code (built fresh every run). No server
// involved in either step.
let compilerPromise = null;
function loadCompiler() {
  if (!compilerPromise) {
    compilerPromise = fetch('kestrelc.wasm')
      .then((r) => {
        if (!r.ok) throw new Error(`couldn't fetch kestrelc.wasm (${r.status})`);
        return r.arrayBuffer();
      })
      .then((bytes) => WebAssembly.instantiate(bytes, {}))
      .then(({ instance }) => instance);
  }
  return compilerPromise;
}

// Compile-result cache, keyed by the exact source text: clicking Run
// repeatedly without editing (the common case) skips straight to
// instantiating the previous result instead of re-invoking the
// compiler. Session-scoped only (an in-memory Map, cleared on reload) —
// a lighter cousin of kestrelc's own on-disk cache (kestrelc/src/cache.rs)
// for the same reason: this is a "skip redundant recompilation" cache,
// not yet the runtime-profile-guided pre-specialization
// kestrel-DESIGN.md idea #1 originally describes. Caches both outcomes
// (success and compile error) since re-running broken code without
// fixing it first is common while iterating too.
const compileCache = new Map(); // source text -> { ok, data: Uint8Array }

async function compileNative(compiler, src) {
  if (compileCache.has(src)) {
    return { result: compileCache.get(src), cached: true };
  }
  const mem = compiler.exports.memory;

  const srcBytes = new TextEncoder().encode(src);
  const srcPtr = compiler.exports.alloc(srcBytes.length);
  new Uint8Array(mem.buffer, srcPtr, srcBytes.length).set(srcBytes);

  const headerPtr = compiler.exports.compile(srcPtr, srcBytes.length);
  // mem.buffer may have been detached/regrown by allocations during
  // compile(), so re-view it fresh before reading the header.
  const header = new DataView(mem.buffer, headerPtr, 9);
  const ok = header.getUint8(0) === 1;
  const dataLen = header.getUint32(1, true);
  const dataPtr = header.getUint32(5, true);
  // .slice() copies out of the compiler's live memory, so the result is
  // safe to hold in the cache past this call (and past any future
  // memory.grow on the compiler instance).
  const data = new Uint8Array(mem.buffer.slice(dataPtr, dataPtr + dataLen));
  compiler.exports.dealloc(srcPtr, srcBytes.length);
  compiler.exports.dealloc(dataPtr, dataLen);
  compiler.exports.dealloc(headerPtr, 9);

  const result = { ok, data };
  compileCache.set(src, result);
  return { result, cached: false };
}

async function runNative() {
  const start = performance.now();
  try {
    const compiler = await loadCompiler();
    const { result, cached } = await compileNative(compiler, codeEl.value);
    const { ok, data } = result;
    const tag = cached ? 'native, cached' : 'native';

    if (!ok) {
      const elapsed = performance.now() - start;
      printLine(new TextDecoder().decode(data), 'err');
      printLine(`— failed after ${formatElapsed(elapsed)} (${tag}) —`, 'err');
      return;
    }

    let programInstance;
    const lineBuf = [];
    const flush = () => { if (lineBuf.length) { printLine(lineBuf.join(' ')); lineBuf.length = 0; } };
    const imports = { env: {
      print_i64: (v, isLast) => { lineBuf.push(v.toString()); if (isLast) flush(); },
      print_str: (ptr, len, isLast) => {
        const bytes = new Uint8Array(programInstance.exports.memory.buffer, ptr, len);
        lineBuf.push(new TextDecoder().decode(bytes));
        if (isLast) flush();
      },
    }};
    const { instance } = await WebAssembly.instantiate(data.buffer, imports);
    programInstance = instance;
    instance.exports.main();

    const elapsed = performance.now() - start;
    printLine(`— finished in ${formatElapsed(elapsed)} (${tag}) —`, 'ok');
  } catch (e) {
    const elapsed = performance.now() - start;
    printLine((e && e.message) ? e.message : String(e), 'err');
    printLine(`— failed after ${formatElapsed(elapsed)} (native) —`, 'err');
  }
}

function formatElapsed(ms) {
  // This is wall-clock time for the whole run (lex + parse + purity
  // check + interpret), not just the interpreter loop — and it includes
  // whatever the device is doing at the moment, so treat it as a rough
  // feel for "fast" vs "slow," not a benchmark. Sub-millisecond runs are
  // reported to two decimal places since most example programs finish
  // that quickly and "0 ms" isn't a useful answer.
  if (ms < 1) return `${ms.toFixed(2)} ms`;
  if (ms < 1000) return `${ms.toFixed(1)} ms`;
  return `${(ms / 1000).toFixed(2)} s`;
}

function switchView(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
  document.getElementById('view-code').classList.toggle('active', name === 'code');
  document.getElementById('view-output').classList.toggle('active', name === 'output');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchView(t.dataset.view));
});
runBtn.addEventListener('click', runProgram);

document.getElementById('examples').addEventListener('change', (e) => {
  const key = e.target.value;
  if (key && EXAMPLES[key]) {
    codeEl.value = EXAMPLES[key];
    syncHighlight();
    debounceSave();
  }
  e.target.value = '';
});

loadSaved();
</script>
</body>
</html>
